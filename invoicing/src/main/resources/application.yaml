spring:
  application:
    name: invoicing
  kafka:
    bootstrap-servers: 'http://localhost:29092'
    consumer:
      group-id: ipurchases-invoicing
      auto-offset-reset: earliest

ipurchases:
  config:
    kafka:
      topics:
        pedidos-pagos: 'ipurchases.pedidos-pagos'
        pedidos-faturados: 'ipurchases.pedidos-faturados'

server:
  port: 8083

minio:
  url: 'http://localhost:9000'
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: ipurchases.invoicing