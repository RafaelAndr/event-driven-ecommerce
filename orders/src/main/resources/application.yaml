spring:
  application:
    name: orders
  datasource:
    url: jdbc:postgresql://localhost:5555/ipurchaseorders
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false

server:
  port: 8080

ipurchases:
  orders:
    clients:
      products:
        url: "http://localhost:8081/products"
      customers:
        url: "http://localhost:8082/customers"
  config:
    kafka:
      server-url: 'http://localhost:29092'
      topics:
        pedidos-pagos: "ipurchases.pedidos-pagos"
        pedidos-faturados: "ipurchases.pedidos-faturados"
        pedidos-enviados: "ipurchases.pedidos-enviados"