spring:
  application:
    name: products
  datasource:
    url: jdbc:postgresql://localhost:5555/ipurchaseproducts
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false

server:
  port: 8081