version: '3.9'

services:
  postgres:
    image: postgres:17.4
    container_name: db_i_purchase
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_i_purchase
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com    # Email para login
      PGADMIN_DEFAULT_PASSWORD: admin           # Senha para login
    ports:
      - "8085:80"
    networks:
      - postgres-network

networks:
  postgres-network:
    driver: bridge